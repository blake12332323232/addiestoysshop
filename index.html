<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addie's Toy Shop</title>
<link rel="stylesheet" href="style.css">
<style>
/* Inline minimal styling so page looks good even without style.css */
body{font-family:Arial;background:linear-gradient(135deg,#ff4d4d,#ff9999);color:white;margin:0;padding:0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
.container{margin-top:50px;width:360px}
.card{background:white;color:black;border-radius:15px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,0.3);margin-bottom:30px;transition:transform 0.3s;position:relative;overflow:hidden}
.card:hover{transform:scale(1.02)}
h1,h2{text-align:center}
input,button{width:90%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;font-size:16px}
button{background:#ff4d4d;color:white;border:none;cursor:pointer;transition:0.3s}
button:hover{background:#ff1a1a}
.price{font-size:24px;color:#ff4d4d;font-weight:bold}
.unavailable{text-decoration:line-through;color:gray}
label{font-weight:bold}
#toy{width:80px;height:80px;border-radius:50%;position:absolute;top:80px;left:140px;cursor:grab;display:flex;justify-content:center;align-items:center;box-shadow:0 5px 15px rgba(0,0,0,0.4);user-select:none;transition: transform 0.5s ease-out;background:red;}
#toy .circle{width:20px;height:20px;border-radius:50%;background:white;margin:0 2px;display:inline-block;}
#colorButtons{display:flex;justify-content:center;margin:10px 0;}
.colorBtn{width:25px;height:25px;margin:0 5px;border-radius:50%;border:none;cursor:pointer;transition:0.3s;}
.colorBtn:hover{transform:scale(1.2);}
.colorRed{background:red;}
.colorBlue{background:blue;}
.colorGreen{background:green;}
</style>
</head>
<body>

<div class="container">
  <h1>🧸 Addie's Toy Shop</h1>

  <div class="card" id="productCard">
    <h2>Fidget Toy</h2>
    <p>Soft toy with movable circles. Drag, click, spin, and enjoy!</p>

    <div id="toy">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>

    <div id="colorButtons">
      <button class="colorBtn colorRed"></button>
      <button class="colorBtn colorBlue"></button>
      <button class="colorBtn colorGreen"></button>
    </div>

    <div class="price" id="totalPrice">$2</div>

    <label>Quantity:</label>
    <input type="number" id="quantity" value="1" min="1" max="5">

    <p><b>Payment:</b></p>
    <p>💵 Cash (Available)</p>
    <p class="unavailable">📱 Cash App (Unavailable)</p>

    <input type="text" id="username" placeholder="Your Name" readonly>
    <button id="orderBtn">Order Now</button>
  </div>

  <div class="card">
    <h3>Login / Register</h3>
    <input type="text" id="loginUser" placeholder="Name">
    <input type="password" id="loginPass" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
